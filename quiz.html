<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aptitude Quiz</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <nav>
        <h2>Career Portal</h2>
        <ul>
            <li><a href="index.html">Home</a></li>
            <li><a href="resume.html">Resume Analyzer</a></li>
            <li><a href="quiz.html">Quiz</a></li>
            <li><a href="interview.html">Interview</a></li>
            <li><a href="career.html">Career Guide</a></li>
            <li><a href="contact.html">Contact</a></li>
        </ul>
    </nav>

    <div class="name-box">
        <input type="text" id="studentName" placeholder="Enter Your Name">
        <select id="streamSelect">
            <option value="">Select Your Stream</option>
            <option value="B.Sc IT">B.Sc IT</option>
            <option value="B.Com">B.Com</option>
            <option value="BAF">BAF</option>
            <option value="BMS">BMS</option>
            <option value="BBI">BBI</option>
            <option value="BA">BA</option>
            <option value="B.Sc">B.Sc</option>
            <option value="Engineering">Engineering</option>
            <option value="All Streams">All Streams</option>
        </select>
        <button onclick="startQuiz()">Start Quiz</button>
    </div>

    <div class="quiz-container" id="quizSection" style="display:none;">
        <h1 id="quizHeader">🧠 All-Round Career Aptitude Quiz</h1>
        <div id="timer">Time Left: 30:00</div>
        <div class="progress">
            <div id="progressBar"></div>
        </div>
        <h2 id="question"></h2>
        <div id="answers"></div>
        <button onclick="nextQuestion()">Next Question</button>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="quiz.js"></script>
</body>
</html>
